name: Build OrcJIT Wheel
description: >
  Build and test OrcJIT wheels for a given OS/architecture combination.
  Handles LLVM caching, conda installation, and cibuildwheel execution.

inputs:
  arch:
    description: "Target architecture (e.g., x86_64, aarch64, arm64, AMD64)"
    required: true
  build:
    description: "cibuildwheel build selector (e.g., cp312-manylinux_x86_64)"
    required: true
  checkout_ref:
    description: "Branch, tag, or SHA to check out before building"
    required: true

runs:
  using: "composite"
  steps:
    - name: Check out source
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.checkout_ref }}
        submodules: recursive

    - uses: ./.github/actions/detect-env-vars
      id: env_vars

    # ---- Install LLVM (DEMO STEP 1: el8 AppStream 21.1.8 via bare dnf, at the manylinux floor) ----
    # No host-side conda / cache / volume mount on Linux: LLVM installs INSIDE the manylinux_2_28
    # container via CIBW_BEFORE_ALL_LINUX (below), and find_package(LLVM) then auto-discovers /usr --
    # so LLVM_PREFIX is unset on Linux. macOS/Windows are out of scope for this demo.
    #
    # This first pass uses the STABLE el8 distro LLVM (bare `dnf install`, resolves to 21.1.8) to
    # verify the workflow mechanics -- dynamic libstdc++ + clean --exclude-libs,ALL + auditwheel --
    # in isolation from the LLVM-23-pre ORC API churn (big-merge failed to compile orcjit_session.cc
    # against trunk). Swap to the big-merge COPR snapshot once the 23 API break is patched.

    # ---- Build and test wheels ----
    - name: Build and test wheels
      uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55  # v4.1.0
      with:
        package-dir: addons/tvm_ffi_orcjit
        output-dir: wheelhouse
      env:
        CIBW_BUILD: ${{ inputs.build }}
        CIBW_ARCHS_LINUX: ${{ inputs.arch }}
        CIBW_ARCHS_MACOS: ${{ inputs.arch }}
        CIBW_ARCHS_WINDOWS: ${{ inputs.arch }}
        CIBW_BUILD_VERBOSITY: 1
        CMAKE_BUILD_PARALLEL_LEVEL: ${{ steps.env_vars.outputs.cpu_count }}
        # DEMO STEP 1: bare dnf on el8 AppStream -> LLVM 21.1.8 (module_el8), built under the el8
        # toolchain so its libstdc++ floor == manylinux_2_28. compiler-rt provides liborc_rt to
        # match llvm-static. zlib/zstd -devel come from BaseOS/PowerTools (already in the image
        # buildroot); the CMake also falls back to the dynamic libs if the static archives are
        # absent. No `dnf copr enable`, no version pin -- verifying mechanics on stable LLVM first.
        CIBW_BEFORE_ALL_LINUX: >-
          dnf install -y --enablerepo=powertools
          llvm-devel llvm-static clang compiler-rt libzstd-devel zlib-devel zlib-static &&
          llvm-config --version
        # Build against the in-tree core (not PyPI) so the addon's tvm_ffi ABI
        # matches the core the tests reinstall; a mismatch segfaults the JIT.
        CIBW_BEFORE_BUILD: pip install "scikit-build-core>=0.10.0" cmake ninja "{project}"
        CIBW_BUILD_FRONTEND: "pip; args: --no-build-isolation"
        CIBW_TEST_REQUIRES: pytest pytest-xdist ninja
        CIBW_TEST_COMMAND: >-
          pip install --force-reinstall {project} &&
          pytest {project}/addons/tvm_ffi_orcjit/tests -v &&
          python {project}/addons/tvm_ffi_orcjit/examples/quick-start/run.py --lang cpp &&
          python {project}/addons/tvm_ffi_orcjit/examples/quick-start/run.py --lang c
        CIBW_TEST_COMMAND_WINDOWS: >-
          pip install --force-reinstall {project} &&
          pytest {project}/addons/tvm_ffi_orcjit/tests -v &&
          python {project}/addons/tvm_ffi_orcjit/examples/quick-start/run.py --lang c
