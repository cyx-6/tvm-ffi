name: Build OrcJIT Wheel
description: >
  Build and test OrcJIT wheels for a given OS/architecture combination.
  Handles LLVM caching, conda installation, and cibuildwheel execution.

inputs:
  arch:
    description: "Target architecture (e.g., x86_64, aarch64, arm64, AMD64)"
    required: true
  build:
    description: "cibuildwheel build selector (e.g., cp312-manylinux_x86_64)"
    required: true
  checkout_ref:
    description: "Branch, tag, or SHA to check out before building"
    required: true
  llvm_version:
    description: "LLVM version (must match the build_llvm job / cache key)"
    default: "22.1.0"
    required: false

runs:
  using: "composite"
  steps:
    - name: Check out source
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.checkout_ref }}
        submodules: recursive

    - uses: ./.github/actions/detect-env-vars
      id: env_vars

    # ---- Acquire LLVM prefix ----
    # Linux: restored from the cache populated by the build_llvm job (built from
    #   source with the manylinux gcc-toolset so the ABI stays under the floor).
    #   That job is a hard dependency, so on Linux this is always a cache hit.
    # macOS/Windows: no GLIBCXX floor -- keep the conda-forge binaries.
    - name: Cache LLVM
      uses: actions/cache@v4
      id: llvm-cache
      with:
        path: ${{ runner.os == 'Windows' && 'C:/opt/llvm' || '/opt/llvm' }}
        key: llvm-${{ inputs.llvm_version }}-${{ runner.os }}-${{ inputs.arch }}-v4

    - name: Verify LLVM cache (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        test -x /opt/llvm/bin/llvm-config \
          || { echo "::error::Linux LLVM cache miss; the build_llvm job must run first"; exit 1; }
        /opt/llvm/bin/llvm-config --version

    # ---- Install LLVM via conda (macOS/Windows, cache miss only) ----
    - name: Setup conda
      if: steps.llvm-cache.outputs.cache-hit != 'true' && runner.os != 'Linux'
      uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167  # v3.3.0
      continue-on-error: true
      id: conda1
      with:
        miniforge-version: latest

    - name: Setup conda (retry with tar.bz2)
      if: steps.llvm-cache.outputs.cache-hit != 'true' && runner.os != 'Linux' && steps.conda1.outcome == 'failure'
      uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167  # v3.3.0
      with:
        miniforge-version: latest
        use-only-tar-bz2: true

    - name: Create /opt/llvm (macOS)
      if: steps.llvm-cache.outputs.cache-hit != 'true' && runner.os == 'macOS'
      shell: bash
      run: sudo mkdir -p /opt/llvm && sudo chown -R $(whoami) /opt/llvm

    - name: Install LLVM (macOS)
      if: steps.llvm-cache.outputs.cache-hit != 'true' && runner.os == 'macOS'
      shell: bash -l {0}
      run: |
        conda create -q -p /opt/llvm -c conda-forge \
          llvmdev=${{ inputs.llvm_version }} clangdev=${{ inputs.llvm_version }} \
          compiler-rt=${{ inputs.llvm_version }} zlib zstd-static \
          -y

    - name: Install LLVM (Windows)
      if: steps.llvm-cache.outputs.cache-hit != 'true' && runner.os == 'Windows'
      shell: cmd /C call {0}
      run: |
        conda create -q -p C:\opt\llvm -c conda-forge llvmdev=${{ inputs.llvm_version }} zlib zstd-static -y

    # ---- Build and test wheels ----
    - name: Build and test wheels
      uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55  # v4.1.0
      with:
        package-dir: addons/tvm_ffi_orcjit
        output-dir: wheelhouse
      env:
        CIBW_BUILD: ${{ inputs.build }}
        CIBW_ARCHS_LINUX: ${{ inputs.arch }}
        CIBW_ARCHS_MACOS: ${{ inputs.arch }}
        CIBW_ARCHS_WINDOWS: ${{ inputs.arch }}
        # Link inside manylinux_2_28 -- the same image family the cached LLVM was
        # built in (gcc-toolset-14). An older image couldn't consume its libs.
        CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
        CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
        CIBW_BUILD_VERBOSITY: 1
        CMAKE_BUILD_PARALLEL_LEVEL: ${{ steps.env_vars.outputs.cpu_count }}
        CIBW_ENVIRONMENT: LLVM_PREFIX=/opt/llvm
        CIBW_ENVIRONMENT_WINDOWS: LLVM_PREFIX="C:/opt/llvm"
        CIBW_CONTAINER_ENGINE: "docker; create_args: --volume /opt/llvm:/opt/llvm"
        # Build against the in-tree core (not PyPI) so the addon's tvm_ffi ABI
        # matches the core the tests reinstall; a mismatch segfaults the JIT.
        CIBW_BEFORE_BUILD: pip install "scikit-build-core>=0.10.0" cmake ninja "{project}"
        CIBW_BUILD_FRONTEND: "pip; args: --no-build-isolation"
        CIBW_TEST_REQUIRES: pytest pytest-xdist ninja
        CIBW_TEST_COMMAND: >-
          pip install --force-reinstall {project} &&
          pytest {project}/addons/tvm_ffi_orcjit/tests -v &&
          python {project}/addons/tvm_ffi_orcjit/examples/quick-start/run.py --lang cpp &&
          python {project}/addons/tvm_ffi_orcjit/examples/quick-start/run.py --lang c
        CIBW_TEST_COMMAND_WINDOWS: >-
          pip install --force-reinstall {project} &&
          pytest {project}/addons/tvm_ffi_orcjit/tests -v &&
          python {project}/addons/tvm_ffi_orcjit/examples/quick-start/run.py --lang c
