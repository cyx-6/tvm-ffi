name: Build LLVM (Linux, from source)
description: >
  Build a minimal static LLVM + liborc_rt into /opt/llvm using the manylinux
  gcc-toolset, so every artifact stays under the manylinux GLIBCXX/CXXABI floor.
  Runs on a HOST job and drives the build via `docker run` (not a job-level
  container:), so /opt/llvm lands on the host and the caller's actions/cache save
  is host-side -- which a later host job (orcjit) can actually restore.
  Runs only on a cache miss; the caller caches /opt/llvm by version + arch.

inputs:
  llvm_version:
    description: "LLVM release (e.g. 22.1.0) -> checks out tag llvmorg-<version>"
    required: true
  manylinux_image:
    description: "manylinux image providing gcc-toolset (arch-specific)"
    required: true
  zlib_version:
    description: "zlib release (tag v<version>)"
    default: "1.3.1"
    required: false
  zstd_version:
    description: "zstd release (tag v<version>)"
    default: "1.5.6"
    required: false

runs:
  using: "composite"
  steps:
    # Sources via checkout on the HOST. github.workspace resolves normally here
    # (no container mount remap). clean: false so each checkout keeps the others.
    - name: Check out llvm-project
      uses: actions/checkout@v5
      with:
        repository: llvm/llvm-project
        ref: llvmorg-${{ inputs.llvm_version }}
        path: llvm-project
        fetch-depth: 1
        filter: blob:none
        clean: false

    - name: Check out zlib
      uses: actions/checkout@v5
      with:
        repository: madler/zlib
        ref: v${{ inputs.zlib_version }}
        path: zlib
        fetch-depth: 1
        clean: false

    - name: Check out zstd
      uses: actions/checkout@v5
      with:
        repository: facebook/zstd
        ref: v${{ inputs.zstd_version }}
        path: zstd
        fetch-depth: 1
        clean: false

    # Build inside the manylinux image via docker run, mounting the workspace
    # (sources + scripts) and /opt/llvm (output). Files land on the host, so the
    # caller's host-side cache save is restorable by the host-side orcjit job.
    - name: Build LLVM + deps + orc_rt into /opt/llvm (docker)
      shell: bash
      run: |
        set -euo pipefail
        sudo mkdir -p /opt/llvm
        docker run --rm \
          -v "$GITHUB_WORKSPACE:/work" \
          -v /opt/llvm:/opt/llvm \
          -e LLVM_PREFIX=/opt/llvm \
          -e LLVM_VERSION="${{ inputs.llvm_version }}" \
          -e LLVM_SRC_DIR=/work/llvm-project \
          -e ZLIB_SRC_DIR=/work/zlib \
          -e ZSTD_SRC_DIR=/work/zstd \
          -e BUILD=/tmp/llvm-build \
          "${{ inputs.manylinux_image }}" \
          bash -euo pipefail -c '
            command -v ninja >/dev/null || pipx install ninja || pip install ninja
            export PATH="$HOME/.local/bin:$PATH"
            d=/work/.github/actions/build-llvm-linux
            bash "$d/10-deps.sh"
            bash "$d/20-llvm.sh"
            bash "$d/30-orcrt.sh"
          '
        # docker wrote /opt/llvm as root; hand it to the runner user so
        # actions/cache can read it and cibuildwheel can bind-mount it.
        sudo chown -R "$(id -u):$(id -g)" /opt/llvm
        echo "LLVM prefix ready at /opt/llvm"
        /opt/llvm/bin/llvm-config --version
