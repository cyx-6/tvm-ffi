name: Build LLVM (Linux, from source)
description: >
  Build a minimal static LLVM + liborc_rt into /opt/llvm using the manylinux
  gcc-toolset, so every artifact stays under the manylinux GLIBCXX/CXXABI floor.
  Runs only on a cache miss; the caller caches /opt/llvm by version + arch.

inputs:
  llvm_version:
    description: "LLVM release (e.g. 22.1.0) -> checks out tag llvmorg-<version>"
    required: true
  zlib_version:
    description: "zlib release (tag v<version>)"
    default: "1.3.1"
    required: false
  zstd_version:
    description: "zstd release (tag v<version>)"
    default: "1.5.6"
    required: false

runs:
  using: "composite"
  steps:
    # LLVM sources (incl. compiler-rt) via checkout -- no download in the build.
    # A blobless shallow checkout keeps the ~monorepo fetch cheap.
    # clean: false on all three so a later checkout doesn't wipe the earlier one
    # (they use distinct paths under the workspace).
    - name: Check out llvm-project
      uses: actions/checkout@v5
      with:
        repository: llvm/llvm-project
        ref: llvmorg-${{ inputs.llvm_version }}
        path: llvm-project
        fetch-depth: 1
        filter: blob:none
        clean: false

    - name: Check out zlib
      uses: actions/checkout@v5
      with:
        repository: madler/zlib
        ref: v${{ inputs.zlib_version }}
        path: zlib
        fetch-depth: 1
        clean: false

    - name: Check out zstd
      uses: actions/checkout@v5
      with:
        repository: facebook/zstd
        ref: v${{ inputs.zstd_version }}
        path: zstd
        fetch-depth: 1
        clean: false

    # cmake ships in the manylinux image; ninja does not. pipx drops shims in
    # ~/.local/bin -- expose it to later steps via GITHUB_PATH.
    - name: Ensure cmake + ninja
      shell: bash
      run: |
        set -euo pipefail
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.local/bin:$PATH"
        command -v cmake >/dev/null || pipx install cmake
        command -v ninja >/dev/null || pipx install ninja
        cmake --version | head -1
        ninja --version

    - name: Build LLVM + deps + orc_rt into /opt/llvm
      shell: bash
      env:
        LLVM_PREFIX: /opt/llvm
        LLVM_VERSION: ${{ inputs.llvm_version }}
        LLVM_SRC_DIR: ${{ github.workspace }}/llvm-project
        ZLIB_SRC_DIR: ${{ github.workspace }}/zlib
        ZSTD_SRC_DIR: ${{ github.workspace }}/zstd
      run: |
        set -euo pipefail
        # Use github.workspace (not github.action_path): for a local action in a
        # container job, action_path keeps the host prefix (/home/runner/work),
        # while the workspace is mounted at /__w. workspace maps correctly.
        d="${{ github.workspace }}/.github/actions/build-llvm-linux"
        bash "$d/10-deps.sh"
        bash "$d/20-llvm.sh"
        bash "$d/30-orcrt.sh"
        echo "LLVM prefix ready at /opt/llvm"
