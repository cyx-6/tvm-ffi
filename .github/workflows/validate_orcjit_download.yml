# VALIDATION ONLY -- exercise the download-from-release orcjit path end to end
# against the REAL LLVM release built in this fork (validate_build_llvm.yml).
# Points the shared build-orcjit-wheel action at llvm_release_repo=<this repo>,
# so the Linux legs download the fork's llvm-22.1.0 asset, link the wheel, and
# run the orcjit test suite -- the true Phase C acceptance check. Delete before
# landing. (mac/win omitted here; they are unchanged conda paths.)
name: validate orcjit download

on:
  workflow_dispatch:
  push:
    branches:
      - ci/validate-orcjit-download

jobs:
  orcjit:
    name: orcjit ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, arch: x86_64, build: "cp312-manylinux_x86_64"}
          - {os: ubuntu-24.04-arm, arch: aarch64, build: "cp312-manylinux_aarch64"}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Build OrcJIT wheel (download LLVM from this fork's release)
        uses: ./.github/actions/build-orcjit-wheel
        with:
          arch: ${{ matrix.arch }}
          build: ${{ matrix.build }}
          checkout_ref: ${{ github.sha }}
          llvm_version: "22.1.0"
          llvm_release_repo: ${{ github.repository }}

      - uses: actions/upload-artifact@v4
        with:
          name: validate-orcjit-${{ matrix.arch }}
          path: wheelhouse/*.whl
