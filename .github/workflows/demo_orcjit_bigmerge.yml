# DEMO (throwaway): price the orcjit wheel built against a fedora-llvm-team big-merge
# el8 AppStream LLVM 21.1.8 (manylinux libstdc++ floor) with dynamic libstdc++ + clean
# -Wl,--exclude-libs,ALL. Push-triggered on the demo branch only. Linux-only, candidate
# arm only -- no PyPI, no macOS/Windows. Compare its cost output against a recent
# conda-22.1.0 orcjit CI run for the baseline.
name: DEMO orcjit big-merge

on:
  push:
    branches:
      - demo/orcjit-bigmerge-cleanall
  workflow_dispatch:

jobs:
  build_wheels:
    name: demo orcjit ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, arch: x86_64, build: "cp312-manylinux_x86_64"}
          - {os: ubuntu-24.04-arm, arch: aarch64, build: "cp312-manylinux_aarch64"}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Build OrcJIT wheel (21.1.8 dnf, dynamic libstdc++, --exclude-libs,ALL)
        uses: ./.github/actions/build-orcjit-wheel
        with:
          arch: ${{ matrix.arch }}
          build: ${{ matrix.build }}
          checkout_ref: ${{ github.sha }}

      # ---- Concrete-cost readout: everything the comparison needs, in the log ----
      - name: Inspect wheel (cost readout)
        shell: bash
        run: |
          set -x
          whl=$(ls wheelhouse/*.whl | head -1)
          echo "## wheel: $(basename "$whl")"
          ls -lh "$whl"
          workdir=$(mktemp -d); unzip -q "$whl" -d "$workdir"
          so=$(find "$workdir" -name '*.so' | grep -i orcjit | head -1)
          echo "## .so size:"; ls -lh "$so"
          echo "## manylinux tag (auditwheel-repaired filename):"; basename "$whl"
          echo "## NEEDED / no static-libstdc++ expected:"; readelf -d "$so" | grep -E 'NEEDED|SONAME'
          echo "## max GLIBCXX / GLIBC required (must be <= manylinux_2_28 floor):"
          readelf -V "$so" | grep -oE 'GLIBCXX_[0-9.]+|GLIBC_[0-9.]+' | sort -uV | tail -12
          echo "## exported dynsym count (expect far fewer than conda build's ~965):"
          readelf --dyn-syms "$so" | awk '$5=="GLOBAL" && ($4=="FUNC"||$4=="OBJECT") && $7!="UND"' | wc -l
          echo "## LLVM symbols exported (expect 0):"
          readelf --dyn-syms "$so" | grep -c '4llvm' || true
          echo "## C++ runtime UNDEFINED (expect UND now -> resolved from dynamic libstdc++):"
          readelf --dyn-syms "$so" | grep -E ' _Znwm$| __cxa_throw$| __gxx_personality_v0$' || true

      - uses: actions/upload-artifact@v4
        with:
          name: demo-orcjit-wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl
