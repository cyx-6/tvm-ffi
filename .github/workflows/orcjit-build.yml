name: OrcJIT Build

on:
  push:
    paths:
      - "addons/tvm-ffi-orcjit/**"
      - ".github/workflows/orcjit-build.yml"
  workflow_dispatch:

jobs:
  build_wheels:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, arch: x86_64, build: "cp312-manylinux_x86_64"}
          - {os: ubuntu-24.04-arm, arch: aarch64, build: "cp312-manylinux_aarch64"}
          - {os: macos-14, arch: arm64, build: "cp312-macosx_arm64"}
          - {os: windows-latest, arch: AMD64, build: "cp312-win_amd64"}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: ./.github/actions/detect-env-vars
        id: env_vars

      - name: Build and test wheels
        uses: pypa/cibuildwheel@v3.1.4
        with:
          package-dir: addons/tvm-ffi-orcjit
          output-dir: wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.build }}
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.arch }}
          CIBW_BUILD_VERBOSITY: 1
          CMAKE_BUILD_PARALLEL_LEVEL: ${{ steps.env_vars.outputs.cpu_count }}
          CIBW_BEFORE_ALL_LINUX: bash {project}/addons/tvm-ffi-orcjit/tools/install_llvm.sh
          CIBW_BEFORE_ALL_MACOS: >-
            sudo mkdir -p /opt/llvm &&
            sudo chown -R $(whoami) /opt/llvm &&
            bash {project}/addons/tvm-ffi-orcjit/tools/install_llvm.sh
          CIBW_BEFORE_ALL_WINDOWS: >-
            powershell -ExecutionPolicy Bypass -File {project}\addons\tvm-ffi-orcjit\tools\install_llvm.ps1
          CIBW_TEST_REQUIRES: pytest
          CIBW_BEFORE_TEST_LINUX: >-
            pip install apache-tvm-ffi &&
            (cd {project}/addons/tvm-ffi-orcjit/tests &&
            cmake -B build -DCMAKE_CXX_COMPILER=/opt/llvm/bin/clang++ -DPython_EXECUTABLE=$(which python) &&
            cmake --build build &&
            cmake --install build) &&
            (cd {project}/addons/tvm-ffi-orcjit/examples/quick-start &&
            cmake -B build -DCMAKE_CXX_COMPILER=/opt/llvm/bin/clang++ -DPython_EXECUTABLE=$(which python) &&
            cmake --build build)
          CIBW_BEFORE_TEST_MACOS: >-
            pip install apache-tvm-ffi &&
            (cd {project}/addons/tvm-ffi-orcjit/tests &&
            cmake -B build -DCMAKE_CXX_COMPILER=/opt/llvm/bin/clang++ -DPython_EXECUTABLE=$(which python) &&
            cmake --build build &&
            cmake --install build) &&
            (cd {project}/addons/tvm-ffi-orcjit/examples/quick-start &&
            cmake -B build -DCMAKE_CXX_COMPILER=/opt/llvm/bin/clang++ -DPython_EXECUTABLE=$(which python) &&
            cmake --build build)
          CIBW_BEFORE_TEST_WINDOWS: >-
            pip install apache-tvm-ffi &&
            pushd {project}\addons\tvm-ffi-orcjit\tests &&
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=C:/opt/llvm/Library/bin/clang.exe -DCMAKE_CXX_COMPILER=C:/opt/llvm/Library/bin/clang++.exe -DPython_EXECUTABLE=%PYTHON% &&
            cmake --build build &&
            cmake --install build &&
            popd &&
            pushd {project}\addons\tvm-ffi-orcjit\examples\quick-start &&
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=C:/opt/llvm/Library/bin/clang.exe -DCMAKE_CXX_COMPILER=C:/opt/llvm/Library/bin/clang++.exe -DPython_EXECUTABLE=%PYTHON% &&
            cmake --build build &&
            popd &&
            (echo "=== DEBUG: Dump undefined symbols from test objects ===" && C:\opt\llvm\Library\bin\llvm-objdump.exe -t {project}\addons\tvm-ffi-orcjit\tests\test_funcs.o 2>&1 || echo "llvm-objdump failed") &&
            (echo "=== DEBUG: Run Python symbol diagnostics ===" && python {project}\addons\tvm-ffi-orcjit\tools\debug_win_symbols.py 2>&1 || echo "Python debug script failed") &&
            (echo "=== DEBUG: Build standalone LLVM JIT test ===" && pushd {project}\addons\tvm-ffi-orcjit\tools && copy debug_win_jit_CMakeLists.txt CMakeLists.txt && cmake -B build_debug -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=C:/opt/llvm/Library/bin/clang.exe -DCMAKE_CXX_COMPILER=C:/opt/llvm/Library/bin/clang++.exe -DCMAKE_PREFIX_PATH=C:/opt/llvm/Library && cmake --build build_debug && echo "=== DEBUG: Run standalone LLVM JIT test ===" && build_debug\debug_win_jit.exe {project}\addons\tvm-ffi-orcjit\tests\test_funcs.o 2>&1 && popd || echo "Standalone LLVM JIT test failed")
          CIBW_TEST_COMMAND: >-
            pytest {project}/addons/tvm-ffi-orcjit/tests -v &&
            (cd {project}/addons/tvm-ffi-orcjit/examples/quick-start &&
            python run.py)
          CIBW_TEST_COMMAND_WINDOWS: >-
            pytest {project}\addons\tvm-ffi-orcjit\tests -v &&
            cd /d {project}\addons\tvm-ffi-orcjit\examples\quick-start &&
            python run.py

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.arch }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl
