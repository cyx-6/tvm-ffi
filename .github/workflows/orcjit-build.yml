name: TVM-FFI-OrcJIT Build Wheels

on:
  push:
    branches:
      - main
      - dev
      - orcjit
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9']

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          activate-environment: build

      - name: Install LLVM and clang
        run: |
          conda install -y -c conda-forge zlib zstd-static llvmdev=22.1.0 clangdev=22.1.0
          echo "====="
          which clang
          clang --version
          echo "====="
          which clang++
          clang++ --version
          echo "====="
          which llvm-config
          llvm-config --version
          echo "====="
          ls /Users/runner/miniconda3/envs/build/
          echo "====="
          echo "CC=$CONDA/envs/build/bin/clang" >> $GITHUB_ENV
          echo "CXX=$CONDA/envs/build/bin/clang++" >> $GITHUB_ENV

      - name: Install tvm-ffi (core package)
        run: |
          pip install -e .

      - name: Build and install tvm-ffi-orcjit
        working-directory: addons/tvm-ffi-orcjit
        run: |
          pip install -e .

      - name: Install test dependencies
        run: |
          conda install pytest

      - name: Build test object files
        working-directory: addons/tvm-ffi-orcjit/tests
        run: |
          cmake -B build
          cmake --build build --target install

      - name: Run tests
        working-directory: addons/tvm-ffi-orcjit
        run: |
          pytest tests/ -v

      - name: Run example
        working-directory: addons/tvm-ffi-orcjit/examples/quick-start
        run: |
          cmake -B build
          cmake --build build
          python run.py