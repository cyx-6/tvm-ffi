# Fast probe (no LLVM build): does building via `docker run` on a HOST job (so
# the cache SAVE is host-side) let a later HOST job restore it? That sidesteps
# the container->host cache miss found earlier. Dummy marker -> ~1 min/run.
name: cache probe

on:
  workflow_dispatch:
  push:
    branches:
      - ci/llvm-from-source

concurrency:
  group: cache-probe-${{ github.ref }}
  cancel-in-progress: true

env:
  KEY: probe-hostdocker-v1
  IMAGE: quay.io/pypa/manylinux_2_28_aarch64

jobs:
  # Producer on the HOST (no container:). Build the dummy prefix by running the
  # manylinux image via `docker run` with a bind mount, so files land on the
  # host and the cache save below is host-side.
  save_host_docker:
    name: save (host+docker)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: docker available on host?
        run: docker --version

      - name: Build dummy /opt/llvm via docker run
        run: |
          docker run --rm -v /opt/llvm:/opt/llvm "$IMAGE" bash -c '
            mkdir -p /opt/llvm/bin
            echo "dummy llvm-config" > /opt/llvm/bin/llvm-config
            chmod +x /opt/llvm/bin/llvm-config
            echo "MARKER=hostdocker" > /opt/llvm/marker.txt
            echo "built by: $(gcc --version | head -1 || echo no-gcc)"
          '
      - name: Inspect on host (ownership / readability)
        run: |
          id
          ls -la /opt/llvm /opt/llvm/bin
          cat /opt/llvm/marker.txt
          # can the runner user (non-root) read it for tar? test explicit read:
          cat /opt/llvm/bin/llvm-config >/dev/null && echo "runner CAN read root-owned files" || echo "runner CANNOT read"

      - name: Save cache (HOST-side)
        uses: actions/cache/save@v4
        with:
          path: /opt/llvm
          key: ${{ env.KEY }}

  # Consumer on the HOST, like the real orcjit job. Expect a HIT now.
  restore_on_host:
    name: restore (host)
    needs: [save_host_docker]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Restore cache (host)
        id: c
        uses: actions/cache/restore@v4
        with:
          path: /opt/llvm
          key: ${{ env.KEY }}
      - name: Report
        run: |
          echo "cache-hit=${{ steps.c.outputs.cache-hit }}"
          if [ -f /opt/llvm/marker.txt ]; then
            echo "HOST RESTORE OK:"; cat /opt/llvm/marker.txt; ls -la /opt/llvm/bin
          else
            echo "HOST RESTORE MISS: /opt/llvm absent"
          fi
